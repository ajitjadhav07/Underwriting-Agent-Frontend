name: Build & Deploy — Frontend

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION:   ap-south-1
  ECR_REPO:     underwriting-agent-frontend

jobs:
  build-and-deploy:
    name: Build, Push & Deploy Frontend (No ALB)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          REGISTRY:  ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$REGISTRY/${{ env.ECR_REPO }}:$IMAGE_TAG
          docker build -t $IMAGE .
          docker push $IMAGE
          docker tag $IMAGE $REGISTRY/${{ env.ECR_REPO }}:latest
          docker push $REGISTRY/${{ env.ECR_REPO }}:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSM (No ALB)
        env:
          FRONTEND_IMAGE: ${{ steps.build.outputs.image }}
        run: |
          aws ssm send-command \
            --region ${{ env.AWS_REGION }} \
            --instance-ids ${{ secrets.WEB_EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ua-frontend ${{ github.sha }}" \
            --parameters 'commands=[
              "aws ecr get-login-password --region '${{ env.AWS_REGION }}' | docker login --username AWS --password-stdin $(echo '"$FRONTEND_IMAGE"' | cut -d/ -f1)",
              "docker pull '"$FRONTEND_IMAGE"'",
              "docker stop ua-frontend || true",
              "docker rm   ua-frontend || true",
              "docker run -d --name ua-frontend --restart unless-stopped -p 3000:3000 -e NODE_ENV=production '"$FRONTEND_IMAGE"'",
              "echo Frontend deployed successfully"
            ]' \
            --output text

      - name: Basic wait (no target group)
        run: |
          echo "Waiting 20 seconds for container..."
          sleep 20
          echo "Deployment completed — no ALB/TG checks required."
